# Harness CI — the docs-era contract.
#
# The single required check is "lint · markdown" (job NAME below — must stay in
# lockstep with scripts/protect-main.sh CONTEXTS array). Once Python code lands,
# add a "ruff · mypy · pytest" job and bump the protected contexts in the same PR.
#
# Mirrors the harness Pre-PR verify gate (§4 + §6 of .copilot/instructions/
# harness.instructions.md) so the local pre-commit loop and the server loop can't
# drift.
name: CI

on:
  push:
  pull_request:
    branches: [main]

# Least privilege: the gates only read the checked-out tree.
permissions:
  contents: read

# Cancel superseded runs on the same logical change to save Actions minutes.
concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint-markdown:
    name: lint · markdown
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: ShellCheck (harness scripts)
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "."
          additional_files: "init.sh start-issue.sh finish-issue.sh check-pr.sh create-pr.sh scripts/issue-lib.sh scripts/protect-main.sh"
          severity: warning
          format: gcc

      - name: markdownlint (docs + root .md)
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: |
            **/*.md
            !**/node_modules/**
            !.copilot-tracking/**
          config: ".markdownlint-cli2.jsonc"

  lint-devcontainer:
    name: lint . devcontainer
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Dev Containers CLI
        run: npm install -g @devcontainers/cli

      - name: Build devcontainer image
        run: devcontainer build --workspace-folder .

      - name: Start devcontainer and run smoke checks
        run: |
          devcontainer up --workspace-folder .
          devcontainer exec --workspace-folder . bash -lc 'node --version && pnpm --version && uv --version && az --version && gh --version'
