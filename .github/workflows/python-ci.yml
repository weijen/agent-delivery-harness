name: Python CI

# Project CI for the repository's Python surface. Issue #272 removed the only
# Python package (scripts/trace_tools, the cloud export leg); the uv/ruff/mypy/
# pytest toolchain is retained dormant so a future Python component gets a ready
# home (mypy exit 2 / pytest exit 5 are treated as no-op skips below). This is
# the adopting-project gate the harness ci-coverage check requires: harness-smoke
# runs the harness's own sensors and is deliberately excluded from that check, so
# the Python profile gates (ruff / mypy / pytest) get their own workflow here.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python-gates:
    name: Python profile gates
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Sync Python environment
        run: uv sync --all-groups

      - name: ruff format
        run: uv run ruff format --check .

      - name: ruff check
        run: uv run ruff check

      - name: mypy
        run: |
          # issue #272 removed the only Python package; mypy exit 2 ("no .py
          # files") is the no-op/skip code while the repo carries no Python
          # source. Any other non-zero is a real type error.
          uv run mypy || { rc=$?; [ "$rc" -eq 2 ] || exit "$rc"; }

      - name: pytest
        run: |
          # pytest exit 5 ("no tests collected") is the skip code while no
          # Python source remains (issue #272); any other non-zero is a real
          # test failure.
          uv run pytest -q || { rc=$?; [ "$rc" -eq 5 ] || exit "$rc"; }
