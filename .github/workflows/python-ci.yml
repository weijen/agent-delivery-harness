name: Python CI

# Project CI for the repository's Python surface (scripts/trace_tools). This is
# the adopting-project gate the harness ci-coverage check requires: harness-smoke
# runs the harness's own sensors and is deliberately excluded from that check, so
# the Python profile gates (ruff / mypy / pytest) get their own workflow here.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python-gates:
    name: Python profile gates
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Sync Python environment
        run: uv sync --all-groups

      - name: ruff format
        run: uv run ruff format --check .

      - name: ruff check
        run: uv run ruff check

      - name: mypy
        run: uv run mypy

      - name: pytest
        run: uv run pytest -q
