name: Harness Smoke

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  SHELLCHECK_VERSION: 0.11.0
  SHELLCHECK_SHA256: 8c3be12b05d5c177a04c29e3c78ce89ac86f1595681cab149b65b97c4e227198

jobs:
  smoke:
    name: Harness smoke
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install shellcheck
        shell: bash
        run: |
          archive="${RUNNER_TEMP}/shellcheck.tar.xz"
          curl -fsSL \
            "https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/shellcheck-v${SHELLCHECK_VERSION}.linux.x86_64.tar.xz" \
            --output "${archive}"
          printf '%s  %s\n' "${SHELLCHECK_SHA256}" "${archive}" | sha256sum --check -
          tar -xJf "${archive}" -C "${RUNNER_TEMP}"
          sudo install \
            "${RUNNER_TEMP}/shellcheck-v${SHELLCHECK_VERSION}/shellcheck" \
            /usr/local/bin/shellcheck
          shellcheck --version

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Sync Python environment
        run: uv sync --all-groups

      - name: Python profile gates
        run: ./scripts/python-gates.sh

      - name: Check shell syntax
        run: bash -n scripts/*.sh tests/scripts/lib/*.sh tests/evals/bin/*.sh

      - name: Run shellcheck
        run: shellcheck scripts/*.sh tests/scripts/*.sh tests/scripts/lib/*.sh tests/meta/*.sh profiles/*.profile.sh tests/evals/bin/*.sh

      - name: Validate customization frontmatter
        shell: bash
        run: bash tests/evals/bin/validate-customization-frontmatter.sh
      - name: Run harness sensor suite
        shell: bash
        run: |
          set -uo pipefail
          shopt -s nullglob
          tests=(tests/scripts/test_*.sh tests/meta/test_*.sh)
          if [ "${#tests[@]}" -eq 0 ]; then
            echo "No harness sensor scripts found." >&2
            exit 1
          fi
          rc=0
          for t in "${tests[@]}"; do
            echo "::group::${t}"
            if bash "$t"; then
              echo "PASS ${t}"
            else
              echo "FAIL ${t}"
              rc=1
            fi
            echo "::endgroup::"
          done
          if [ "$rc" -ne 0 ]; then
            echo "One or more harness sensors failed." >&2
          fi
          exit "$rc"

      - name: Run L0 suite gate
        shell: bash
        run: bash tests/evals/bin/run-l0-suite.sh
