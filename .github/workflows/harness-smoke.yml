name: Harness Smoke

on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke:
    name: Harness smoke
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Check shell syntax
        run: bash -n scripts/*.sh

      - name: Run shellcheck
        run: shellcheck scripts/*.sh tests/scripts/*.sh tests/meta/*.sh profiles/*.profile.sh

      - name: Validate customization frontmatter
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(.copilot/agents/*.agent.md .copilot/skills/*/SKILL.md)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Copilot agent or skill files found; skipping frontmatter validation."
            exit 0
          fi
          for file in "${files[@]}"; do
            awk '
              NR == 1 && $0 != "---" { exit 1 }
              NR > 1 && $0 == "---" { found = 1; exit 0 }
              END { if (!found) exit 1 }
            ' "$file"
          done
      - name: Run harness sensor suite
        shell: bash
        run: |
          set -uo pipefail
          shopt -s nullglob
          tests=(tests/scripts/test_*.sh tests/meta/test_*.sh)
          if [ "${#tests[@]}" -eq 0 ]; then
            echo "No harness sensor scripts found." >&2
            exit 1
          fi
          rc=0
          for t in "${tests[@]}"; do
            echo "::group::${t}"
            if bash "$t"; then
              echo "PASS ${t}"
            else
              echo "FAIL ${t}"
              rc=1
            fi
            echo "::endgroup::"
          done
          if [ "$rc" -ne 0 ]; then
            echo "One or more harness sensors failed." >&2
          fi
          exit "$rc"
