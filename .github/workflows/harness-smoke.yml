name: Harness Smoke

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke:
    name: Harness smoke
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Sync Python environment
        run: uv sync --all-groups

      - name: Python profile gates
        run: |
          uv run ruff format --check .
          uv run ruff check
          # issue #272 deleted the only Python package (scripts/trace_tools/, the
          # cloud export leg). While the repo carries no Python source, mypy exit
          # 2 ("no .py files") and pytest exit 5 ("no tests collected") are the
          # no-op/skip codes; any other non-zero is a real failure. The toolchain
          # is retained dormant so a future Python component gets a ready home.
          uv run mypy || { rc=$?; [ "$rc" -eq 2 ] || exit "$rc"; }
          uv run pytest -q || { rc=$?; [ "$rc" -eq 5 ] || exit "$rc"; }

      - name: Check shell syntax
        run: bash -n scripts/*.sh tests/scripts/lib/*.sh tests/evals/bin/*.sh

      - name: Run shellcheck
        run: shellcheck scripts/*.sh tests/scripts/*.sh tests/scripts/lib/*.sh tests/meta/*.sh profiles/*.profile.sh tests/evals/bin/*.sh

      - name: Validate customization frontmatter
        shell: bash
        run: bash tests/evals/bin/validate-customization-frontmatter.sh
      - name: Run harness sensor suite
        shell: bash
        run: |
          set -uo pipefail
          shopt -s nullglob
          tests=(tests/scripts/test_*.sh tests/meta/test_*.sh)
          if [ "${#tests[@]}" -eq 0 ]; then
            echo "No harness sensor scripts found." >&2
            exit 1
          fi
          rc=0
          for t in "${tests[@]}"; do
            echo "::group::${t}"
            if bash "$t"; then
              echo "PASS ${t}"
            else
              echo "FAIL ${t}"
              rc=1
            fi
            echo "::endgroup::"
          done
          if [ "$rc" -ne 0 ]; then
            echo "One or more harness sensors failed." >&2
          fi
          exit "$rc"

      - name: Run L0 suite gate
        shell: bash
        run: bash tests/evals/bin/run-l0-suite.sh
