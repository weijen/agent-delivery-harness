# harness-contract.yml — frozen lifecycle contract for the issue-driven harness.
#
# This file is the MACHINE-READABLE AUTHORITY for the harness lifecycle. It is the
# baseline that future profile / language / init.sh refactors compare against.
# tests/scripts/test_harness_contract.sh reads this file and verifies that the
# current scripts still expose the declared behavior.
#
# Rule of engagement (TDD discipline): a harness behavior change must FIRST change
# this contract (and the sensor) intentionally, THEN change the implementation.
# Removing a required script, lifecycle obligation, Action Log scaffold,
# feature-list requirement, or review-gate boundary from the scripts WITHOUT an
# intentional update here is a regression and the sensor must fail.
#
# Format notes for the awk-based reader in test_harness_contract.sh:
#   * Two-space indentation, no tabs.
#   * List items under a section are written as `- key: value` then indented
#     `field: value` lines, OR as a single `- value` scalar.
#   * `pattern:` / `present:` / `absent:` values are extended-regex (grep -E)
#     fragments matched against the owning script with `grep -Eiq`.
#   * Keep values on a single line; the reader does not handle YAML block scalars.

version: 2
review_by: 2027-01-23

# ---------------------------------------------------------------------------
# Required entrypoints. Each must exist, be executable, and parse with bash -n.
# `role` is documentation; `path` is the test authority.
# ---------------------------------------------------------------------------
scripts:
  - id: init
    path: scripts/init.sh
    role: Preflight environment sensor; never installs interactively.
  - id: issue-lib
    path: scripts/issue-lib.sh
    role: Shared issue naming library (sourced, not executed).
  - id: github-identity-lib
    path: scripts/github-identity-lib.sh
    role: Sourceable repository-bound GitHub token and local Git identity resolver.
  - id: trace-lib
    path: scripts/trace-lib.sh
    role: Sourceable trace-span emitter for deep tracing; schema authority docs/evaluation/trace-schema.v1.json.
  - id: ci-coverage-lib
    path: scripts/ci-coverage-lib.sh
    role: Sourceable project-CI coverage detector; owns language gate-signature tokens so review-gate.sh/create-pr.sh stay language-neutral.
  - id: start-issue
    path: scripts/start-issue.sh
    role: Begin an issue in an isolated branch + worktree; scaffold tracking state.
  - id: check-feature-list
    path: scripts/check-feature-list.sh
    role: Validate per-issue feature_list.json structure and completion.
  - id: run-sensors
    path: scripts/run-sensors.sh
    role: Run scoped or full sensors and save a HEAD-bound gate summary.
  - id: log-handback
    path: scripts/log-handback.sh
    role: Emit semantic handback and review-verdict evidence.
  - id: check-trace-consistency
    path: scripts/check-trace-consistency.sh
    role: Trace/artifact consistency checker with schema validation.
  - id: review-gate
    path: scripts/review-gate.sh
    role: HEAD-bound local review approval marker.
  - id: create-pr
    path: scripts/create-pr.sh
    role: Sync onto main, enforce review gate, push, and open the PR.
  - id: merge-pr
    path: scripts/merge-pr.sh
    role: Verify the PR's CI checks concluded green, then merge through the explicit closeout command.
  - id: finish-issue
    path: scripts/finish-issue.sh
    role: Tear down the worktree after the PR merges.
  - id: finish-lib
    path: scripts/finish-lib.sh
    role: Sourceable closeout helpers for finish-issue.sh (trace gate + best-effort state-hygiene); sourced, not executed.
  - id: economics-report-lib
    path: scripts/economics-report-lib.sh
    role: Sourceable report-time delivery and native economics analytics; sourced, not executed.

# ---------------------------------------------------------------------------
# Four lifecycle gates. Every record names its trigger, consumed evidence,
# produced evidence, enforcement mode, and implementation owner.
# ---------------------------------------------------------------------------
gate_start:
  - id: issue-worktree
    trigger: issue selected for delivery
    consumes: live GitHub issue record and successful preflight exit
    produces: isolated branch, worktree, and tracking scaffold
    mode: hard
    owner: scripts/start-issue.sh
    present: git worktree add
  - id: tracking-ready
    trigger: issue tracking scaffold created
    consumes: feature_list.json
    produces: validated criterion-sized delivery breakdown
    mode: hard
    owner: scripts/check-feature-list.sh
    present: feature_list.json

gate_sensors:
  - id: scoped-green
    trigger: implementation unit ready for verification
    consumes: declared and affected sensor set
    produces: HEAD-bound SENSORS summary with exit status
    mode: hard
    owner: scripts/run-sensors.sh
    present: SENSORS.*head=.*scope=.*ran=.*failed=

gate_review:
  - id: trace-consistency
    trigger: review or closeout trace check
    consumes: harness-observed trace and artifact state
    produces: review-gate.trace verdict span
    mode: warn
    owner: scripts/review-gate.sh
    present: gen_ai.tool.name=review-gate.trace
  - id: independent-review
    trigger: all issue features complete and pre-review sensors green
    consumes: independent review verdict and reviewed SHA
    produces: HEAD-bound approved-head marker
    mode: hard
    owner: scripts/review-gate.sh
    present: approve
  - id: approved-pr
    trigger: independent review approved at current HEAD
    consumes: HEAD-bound approved-head marker
    produces: synchronized branch and open PR
    mode: hard
    owner: scripts/create-pr.sh
    present: gh pr create

gate_merge_closeout:
  - id: ci-green-merge
    trigger: approved PR ready to merge
    consumes: GitHub CI checks green at the PR HEAD
    produces: merged PR
    mode: hard
    owner: scripts/merge-pr.sh
    present: gh pr checks
  - id: issue-closeout
    trigger: PR merged
    consumes: merged PR state and complete local issue state
    produces: removed issue worktree and pruned metadata
    mode: hard
    owner: scripts/finish-issue.sh
    present: git worktree (remove|prune)

# ---------------------------------------------------------------------------
# Evidence governance. Hard gates consume only harness-observed evidence.
# New rules ship warn first and promote to hard after an observation period.
# ---------------------------------------------------------------------------
evidence:
  - id: sensor-summary
    provenance: harness-observed
    examples: trace spans, exit codes, SENSORS summaries, and gh pr checks
  - id: progress-prose
    provenance: agent-claimed
    examples: progress.md prose and PR text

policy:
  - id: hard-gates-observed-only
    rule: hard gates consume only harness-observed evidence
  - id: new-rules-warn-first
    rule: new clauses ship warn and promote to hard after observation

sha_bindings:
  - id: approval-head
    binding: review approval is bound to HEAD by approved-head
    owner: scripts/review-gate.sh
    present: approved-head
  - id: review-verdict
    binding: review verdict carries reviewed_sha
    owner: scripts/log-handback.sh
    present: reviewed_sha
  - id: ci-green-head
    binding: merge consumes CI-green checks at the PR HEAD
    owner: scripts/merge-pr.sh
    present: gh pr checks

bypasses:
  - id: FORCE
    audit: operator records the forced-removal rationale in the issue Action Log
    owner: scripts/finish-issue.sh
    present: FORCE
  - id: SKIP_CI_GATE
    audit: log the skipped project-CI coverage check
    owner: scripts/review-gate.sh
    present: SKIP_CI_GATE
  - id: CREATE_PR_NO_REWRITE
    audit: preserve and report the explicit non-rewriting PR path
    owner: scripts/create-pr.sh
    present: CREATE_PR_NO_REWRITE

# ---------------------------------------------------------------------------
# Slim supporting inventory of environment flags.
# ---------------------------------------------------------------------------
env_flags:
  - name: ISSUE=
    owner: scripts/issue-lib.sh
    present: ISSUE=
  - name: SLUG=
    owner: scripts/start-issue.sh
    present: SLUG=
  - name: SKIP_INIT
    owner: scripts/start-issue.sh
    present: SKIP_INIT
  - name: REQUIRE_FEATURES_COMPLETE
    owner: scripts/check-feature-list.sh
    present: REQUIRE_FEATURES_COMPLETE
  - name: REQUIRE_TRACE_CONSISTENCY
    owner: scripts/review-gate.sh
    present: REQUIRE_TRACE_CONSISTENCY
  - name: REQUIRE_AZ
    owner: scripts/init.sh
    present: REQUIRE_AZ
  - name: FORCE
    owner: scripts/finish-issue.sh
    present: FORCE
  - name: DELETE_BRANCH
    owner: scripts/finish-issue.sh
    present: DELETE_BRANCH
  - name: SKIP_CI_GATE
    owner: scripts/review-gate.sh
    present: SKIP_CI_GATE
  - name: CREATE_PR_NO_REWRITE
    owner: scripts/create-pr.sh
    present: CREATE_PR_NO_REWRITE


# ---------------------------------------------------------------------------
# Boundaries that MUST stay language-neutral. The listed owner scripts must not
# hard-code any language/toolchain token from `tokens`. This protects issue
# naming, worktree lifecycle, feature-list schema, review-gate state, and PR
# closeout from gaining language branches as profiles land.
# ---------------------------------------------------------------------------
language_neutral:
  owners:
    - scripts/issue-lib.sh
    - scripts/trace-lib.sh
    - scripts/start-issue.sh
    - scripts/check-feature-list.sh
    - scripts/review-gate.sh
    - scripts/create-pr.sh
    - scripts/merge-pr.sh
    - scripts/finish-issue.sh
  tokens:
    - python
    - pyproject
    - golang
    - go.mod
    - pnpm
    - npm
    - terraform
    - maven
    - gradle
    - bundler
    - rubocop
    - pytest
    - mypy
    - ruff

# ---------------------------------------------------------------------------
# Human-review lifecycle diagram, derived from the contract above. NOT the test
# authority — the YAML sections are. Kept here so a Mermaid view can be rendered
# without a second source of truth.
# ---------------------------------------------------------------------------
mermaid: |
  flowchart TD
    start[Gate 1: preflight + issue worktree] --> sensors[Gate 2: scoped/full sensors green]
    sensors --> review[Gate 3: independent review + approved PR]
    review --> closeout[Gate 4: CI-green merge + closeout]
